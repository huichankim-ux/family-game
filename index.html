<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아빠를 이겨라 이것들아</title>
    <style>
        body {
            margin: 0; padding: 0; background: #222;
            font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #gameContainer {
            width: 100%; max-width: 800px; aspect-ratio: 16 / 9;
            background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }
        canvas { width: 100%; height: 100%; display: block; background: #000; }
        
        #nameInputOverlay {
            display: none; position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 30;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; box-sizing: border-box;
        }
        .modal-box { background: #2d3748; padding: 25px; border-radius: 12px; border: 4px solid #ffca28; text-align: center; width: 340px; }
        .modal-box h2 { color: #ffca28; margin-top: 0; font-size: 1.6rem; text-shadow: 2px 2px #000; }
        .modal-box input { width: 80%; padding: 10px; font-size: 1.1rem; border: none; border-radius: 6px; text-align: center; font-weight: bold; margin: 15px 0; }
        .modal-box button { background: #ff5722; color: white; border: none; padding: 10px 25px; font-size: 1.1rem; font-weight: bold; border-radius: 6px; cursor: pointer; box-shadow: 0 4px #bf360c; }
        .modal-box button:active { transform: translateY(2px); box-shadow: none; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="450"></canvas>
    
    <div id="nameInputOverlay">
        <div class="modal-box">
            <h2 id="overlayTitle">🏆 명예의 전당 등극 🏆</h2>
            <p id="overlaySub" style="margin: 5px 0;">스테이지 클리어 기록 완료!</p>
            <p style="color: #48bb78; font-weight: bold;">최종 점수: <span id="overlayScore">0</span>점</p>
            <input type="text" id="playerName" placeholder="이름을 입력하세요" maxlength="8">
            <br>
            <button onclick="submitRanking()">랭킹 등록하기</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        if (type === 'jump') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(160, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(450, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'doubleJump') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(280, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'item') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(350, audioCtx.currentTime);
            osc.frequency.setValueAtTime(700, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'powerup') { 
            osc.type = 'sine'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(900, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'hit') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'pushAlert') { 
            osc.type = 'sine'; osc.frequency.setValueAtTime(580, audioCtx.currentTime);
            osc.frequency.setValueAtTime(720, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'speedupAlert') { 
            osc.type = 'sine'; osc.frequency.setValueAtTime(550, audioCtx.currentTime);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.07);
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'gameover') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.6);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.6);
        } else if (type === 'fanfare') {
            const now = audioCtx.currentTime;
            const notes = [261.63, 329.63, 392.00, 523.25, 392.00, 523.25, 659.25];
            notes.forEach((freq, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.type = 'triangle'; o.frequency.value = freq; o.connect(g); g.connect(audioCtx.destination);
                g.gain.setValueAtTime(0.2, now + i*0.12); o.start(now + i*0.12); o.stop(now + i*0.12 + 0.1);
            });
        }
    }

    const charSettings = {
        dad: { name: '아빠', theme: '#4a5568', obstacle: '⚙️', bgName: '공장 지대', imgUrl: 'dad.png', bodyColor: '#3182ce', xBound: [140, 240], decors: ['🏭', '🏗️', '🔩', '☁️'] },
        mom: { name: '엄마', theme: '#48bb78', obstacle: '🛒', bgName: '슈퍼마켓', imgUrl: 'mom.png', bodyColor: '#f6ad55', xBound: [280, 380], decors: ['🏪', '🛍️', '🏷️', '✨'] },
        hayun: { name: '하윤', theme: '#ed64a6', obstacle: '🪑', bgName: '학교 가는 길', imgUrl: 'hayun.png', bodyColor: '#b7791f', xBound: [420, 520], decors: ['🏫', '🌳', '☀️', '🎈'] },
        yeeun: { name: '예은', theme: '#805ad5', obstacle: '🎒', bgName: '학교 교실', imgUrl: 'yeeun.png', bodyColor: '#e53e3e', xBound: [560, 660], decors: ['📝', '✏️', '🎨', '💡'] }
    };

    // [신규 변경] 단계별 커스텀 골인 대사 배열 매핑
    const stageClearMessages = {
        1: "쉽지 이정도는?",
        2: "풉! 자만하지마",
        3: "쫌 하네? 후훗",
        4: "어쭈 이것봐라?",
        5: "이제부턴 쉽지 않을걸?",
        6: "아빠를 이길라고?",
        7: "준비해라 이제 부터 헬모드다",
        8: "이 다음 단계 통과 하면 인정!!",
        9: "자 이제 마지막 단계다!",
        10: "아빠가 졌다 이것들아. 잘했어! 멋져!!!"
    };

    const images = {};
    Object.keys(charSettings).forEach(key => {
        images[key] = new Image(); images[key].src = charSettings[key].imgUrl;
    });

    let gameState = 'ready'; 
    let selectedChar = 'dad';
    let score = 0; let distance = 0; let gameSpeed = 6;
    
    let currentStage = 1;
    const maxStage = 10;
    const stageTargetDistance = 600; // [변경] 단계별 목표 주행 거리를 600m 단위로 설정!

    let player = { 
        x: 120, y: 300, width: 50, height: 75, 
        vy: 0, gravity: 0.72, maxFallingSpeed: 13, 
        isGrounded: false, speedX: 7, 
        jumpCount: 0, maxJumps: 2,
        baseJumpPower: -14.2, jumpPower: -14.2,
        boostTimer: 0
    };
    
    let obstacles = []; let items = []; let platforms = []; let steps = []; let bgElements = [];
    let spawnTimer = 0; let flashTimer = 0; let deathAnimateTimer = 0;
    let isForcedPushing = false; 

    let messageText = "";
    let messageTimer = 0;
    let isMessageForced = false; 

    let speedMilestones = [false, false, false, false]; 

    let particles = [];
    let goalFinishTimer = 0;
    let goalFlagX = 950; 

    let inputStatus = { leftPressed: false, rightPressed: false };
    let leaderboard = [];

    function showSpeechMessage(text, forced = false) {
        if (player.boostTimer > 0 && !forced) return;
        messageText = text; messageTimer = forced ? 75 : 60; isMessageForced = forced;
    }

    function createConfetti() {
        particles = [];
        for(let i=0; i<60; i++) {
            particles.push({
                x: Math.random() * canvas.width, y: Math.random() * -100 - 10,
                size: 5 + Math.random() * 6, color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                speedY: 2 + Math.random() * 3, speedX: -1.5 + Math.random() * 3,
                rotation: Math.random() * 360, rotSpeed: -3 + Math.random() * 6
            });
        }
    }

    function loadLeaderboard() {
        const savedData = localStorage.getItem('kimFamilyCustomLeaderboard');
        if (savedData) { leaderboard = JSON.parse(savedData); } 
        else {
            leaderboard = [
                { name: '김하윤', score: 25000, date: 'Lv.3' },
                { name: '아빠', score: 18500, date: 'Lv.2' },
                { name: '엄마', score: 16200, date: 'Lv.1' }
            ];
            saveLeaderboard();
        }
    }
    function saveLeaderboard() { localStorage.setItem('kimFamilyCustomLeaderboard', JSON.stringify(leaderboard)); }

    function triggerMobileLandscapeFullscreen() {
        const docEl = document.documentElement;
        try {
            if (docEl.requestFullscreen) { docEl.requestFullscreen(); }
            else if (docEl.webkitRequestFullscreen) { docEl.webkitRequestFullscreen(); }
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(e => console.log("Orientation lock not supported"));
            }
        } catch(err) { console.log("Fullscreen restriction"); }
    }

    function handlePointerDown(clientX, clientY) {
        if (document.getElementById('nameInputOverlay').style.display === 'flex') return;
        const rect = canvas.getBoundingClientRect();
        const clickX = (clientX - rect.left) * (canvas.width / rect.width);
        const clickY = (clientY - rect.top) * (canvas.height / rect.height);

        if (gameState === 'ready') {
            if (clickY >= 160 && clickY <= 260) {
                Object.keys(charSettings).forEach(key => {
                    const bounds = charSettings[key].xBound;
                    if (clickX >= bounds[0] && clickX <= bounds[1]) { 
                        selectedChar = key; 
                        triggerMobileLandscapeFullscreen(); 
                        initGame(); 
                    }
                });
            }
        } else if (gameState === 'playing') {
            if (clickX >= 690 && clickX <= 780 && clickY >= 18 && clickY <= 48) { gameState = 'ready'; return; }
        } else if (gameState === 'ending' || gameState === 'gameover') {
            if (clickX >= 300 && clickX <= 500 && clickY >= 340 && clickY <= 395) { gameState = 'ready'; }
        }
    }

    function parseTouches(e) {
        if (gameState !== 'playing') return;
        const rect = canvas.getBoundingClientRect();
        let hasLeftMove = false;
        
        for (let i = 0; i < e.touches.length; i++) {
            let tX = (e.touches[i].clientX - rect.left) * (canvas.width / rect.width);
            let tY = (e.touches[i].clientY - rect.top) * (canvas.height / rect.height);
            
            if (tX >= 690 && tX <= 780 && tY >= 18 && tY <= 48) continue;

            if (tX < canvas.width / 2) {
                if (tX < canvas.width * 0.22) { inputStatus.leftPressed = true; inputStatus.rightPressed = false; } 
                else { inputStatus.rightPressed = true; inputStatus.leftPressed = false; }
                hasLeftMove = true;
            }
        }
        if (!hasLeftMove) { inputStatus.leftPressed = false; inputStatus.rightPressed = false; }
    }

    canvas.addEventListener('mousedown', (e) => handlePointerDown(e.clientX, e.clientY));
    canvas.addEventListener('mousemove', (e) => {
        if (gameState !== 'playing') return;
        const rect = canvas.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
        if (e.buttons === 1) {
            if (clickX < canvas.width / 2) {
                if (clickX < canvas.width * 0.22) { inputStatus.leftPressed = true; inputStatus.rightPressed = false; }
                else { inputStatus.rightPressed = true; inputStatus.leftPressed = false; }
            }
        }
    });
    window.addEventListener('mouseup', () => { inputStatus.leftPressed = false; inputStatus.rightPressed = false; });

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault(); if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        if (gameState === 'playing') {
            const rect = canvas.getBoundingClientRect();
            for (let i = 0; i < e.changedTouches.length; i++) {
                let curX = (e.changedTouches[i].clientX - rect.left) * (canvas.width / rect.width);
                if (curX >= canvas.width / 2) { jump(); } 
            }
            parseTouches(e);
        } else {
            handlePointerDown(e.touches[0].clientX, e.touches[0].clientY);
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); parseTouches(e); }, { passive: false });
    window.addEventListener('touchend', (e) => { if (gameState === 'playing') parseTouches(e); });

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowUp') { if (gameState === 'playing') { e.preventDefault(); jump(); } }
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') inputStatus.leftPressed = true;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') inputStatus.rightPressed = true;
    });
    window.addEventListener('keyup', (e) => {
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') inputStatus.leftPressed = false;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') inputStatus.rightPressed = false;
    });

    function initGame() {
        gameState = 'playing'; score = 0; distance = 0; currentStage = 1; goalFlagX = 950;
        speedMilestones = [false, false, false, false]; isMessageForced = false;
        gameSpeed = 6.0; 
        player.x = 150; player.y = 300; player.vy = 0; player.jumpCount = 0;
        player.jumpPower = player.baseJumpPower; player.boostTimer = 0;
        obstacles = []; items = []; platforms = []; steps = []; particles = []; bgElements = [];
        spawnTimer = 0; flashTimer = 0; deathAnimateTimer = 0; goalFinishTimer = 0;
        messageText = ""; messageTimer = 0; isForcedPushing = false;
        document.getElementById('nameInputOverlay').style.display = 'none';
        playSound('jump');
    }

    function jump() {
        if (gameState !== 'playing') return;
        if (player.isGrounded || player.jumpCount < player.maxJumps) {
            let power = player.boostTimer > 0 ? player.jumpPower * 1.25 : player.jumpPower;
            if (player.jumpCount === 0) { player.vy = power; playSound('jump'); } 
            else { player.vy = power * 0.88; playSound('doubleJump'); }
            player.jumpCount++; player.isGrounded = false;
        }
    }

    function mainLoop() { update(); render(); requestAnimationFrame(mainLoop); }

    function update() {
        if (gameState === 'gameover') {
            deathAnimateTimer++; player.vy += 0.6; player.y += player.vy; player.x -= 2;
            if (deathAnimateTimer > 90) {
                gameState = 'inputName';
                document.getElementById('overlayTitle').innerText = "💀 미션 탈락! 💀";
                document.getElementById('overlaySub').innerText = `Stage ${currentStage}에서 멈췄습니다.`;
                document.getElementById('overlayScore').innerText = score;
                document.getElementById('nameInputOverlay').style.display = 'flex';
            }
            return;
        }
        
        if (gameState === 'goalSuccess') {
            goalFinishTimer++;
            particles.forEach(p => { p.y += p.speedY; p.x += p.speedX; p.rotation += p.rotSpeed; });
            
            if (goalFinishTimer > 150) {
                if (currentStage < maxStage) {
                    currentStage++;
                    distance = 0; goalFlagX = 950; goalFinishTimer = 0;
                    speedMilestones = [false, false, false, false]; isMessageForced = false;
                    obstacles = []; steps = []; items = []; platforms = []; particles = []; bgElements = [];
                    gameState = 'playing';
                } else {
                    gameState = 'inputName';
                    document.getElementById('overlayTitle').innerText = "🎉 10단계 완전 정복! 🎉";
                    document.getElementById('overlaySub').innerText = "위대한 주행 기록 달성 완료!";
                    document.getElementById('overlayScore').innerText = score;
                    document.getElementById('nameInputOverlay').style.display = 'flex';
                }
            }
            return;
        }
        
        if (gameState !== 'playing') return;

        distance += gameSpeed * 0.05; score += 1;
        
        // 1단계 기본속도 6.0 세팅, 이후 각 단계 진입 시 기본속도 0.5씩 점진적 고속 보강
        let baseSpeed = 6.0 + ((currentStage - 1) * 0.5); 
        let currentDisplayDistance = Math.floor(distance);
        
        // [변경] 가속 싱크 주기를 200m 마다 순차적으로 계산 (600m 목표 거리에 부합하도록 200m, 400m 가속 체인 구축)
        let milestoneIndex = Math.floor(currentDisplayDistance / 200) - 1;
        if (milestoneIndex >= 0 && milestoneIndex < 2 && !speedMilestones[milestoneIndex]) {
            speedMilestones[milestoneIndex] = true;
            playSound('speedupAlert');
            showSpeechMessage("⚡ SPEED UP!! ⚡", true);
        }

        let currentBoostCount = Math.floor(currentDisplayDistance / 200);
        gameSpeed = baseSpeed + (currentBoostCount * 0.5);

        if (messageTimer > 0) {
            messageTimer--;
            if (messageTimer <= 0) isMessageForced = false;
        }

        if (player.boostTimer > 0) {
            player.boostTimer--;
            let remainSeconds = Math.ceil(player.boostTimer / 60);
            if (!isMessageForced) { messageText = `🔥 FEVER ${remainSeconds}s`; }
            if (player.boostTimer <= 0) { player.jumpPower = player.baseJumpPower; if (!isMessageForced) messageText = ""; }
        }

        let wishX = player.x;
        if (inputStatus.leftPressed) wishX -= player.speedX;
        if (inputStatus.rightPressed) wishX += player.speedX;
        player.x = Math.max(0, Math.min(canvas.width - player.width, wishX));

        player.vy += player.gravity;
        if (player.vy > player.maxFallingSpeed) player.vy = player.maxFallingSpeed;
        player.y += player.vy;

        let onSurface = false; isForcedPushing = false; 

        // 계단식 블록 연산
        for (let i = steps.length - 1; i >= 0; i--) {
            let step = steps[i]; step.x -= gameSpeed;
            if (player.x + player.width > step.x && player.x < step.x + step.width &&
                player.y + player.height > step.y && player.y < step.y + step.height) {
                if (player.boostTimer > 0) { steps.splice(i, 1); continue; }
                if (player.y + player.height - player.vy <= step.y + 12 && player.vy >= 0) {
                    player.y = step.y - player.height; player.vy = 0; player.isGrounded = true; player.jumpCount = 0; onSurface = true;
                } else {
                    player.x -= (gameSpeed + 1.5); isForcedPushing = true; 
                    if (!isMessageForced) showSpeechMessage("아야!");
                    if (flashTimer % 12 === 0) playSound('pushAlert'); 
                }
            }
            if (step.x < -150) steps.splice(i, 1);
        }

        // 공중 발판
        for (let i = 0; i < platforms.length; i++) {
            let plat = platforms[i]; plat.x -= gameSpeed;
            if (player.x + player.width > plat.x && player.x < plat.x + plat.width &&
                player.y + player.height > plat.y && player.y < plat.y + plat.height) {
                if (player.y + player.height - player.vy <= plat.y + 12 && player.vy >= 0) {
                    player.y = plat.y - player.height; player.vy = 0; player.isGrounded = true; player.jumpCount = 0; onSurface = true;
                } else if (player.y - player.vy >= plat.y + plat.height - 10 && player.vy < 0) {
                    player.y = plat.y + plat.height; player.vy = 0;
                }
            }
        }
        for (let i = platforms.length - 1; i >= 0; i--) { if (platforms[i].x < -200) platforms.splice(i, 1); }

        if (!onSurface) {
            if (player.y >= 300) { player.y = 300; player.vy = 0; player.isGrounded = true; player.jumpCount = 0; } 
            else { if (player.jumpCount === 0) player.jumpCount = 1; player.isGrounded = false; }
        }

        if (player.x <= 0) {
            player.x = 0; 
            if (isForcedPushing) { gameState = 'gameover'; player.vy = -10; playSound('gameover'); return; }
        }

        // [변경] 골인 체크 연산 라인을 600m 기준으로 즉시 칼같이 발동 정지!
        if (currentDisplayDistance >= stageTargetDistance) {
            distance = stageTargetDistance; gameSpeed = 0;
            gameState = 'goalSuccess';
            createConfetti(); playSound('fanfare');
            return;
        }

        // 단계별 장애물 밀도 차별화 자동 제어 루틴
        spawnTimer++;
        let baseDelay = 72 - (currentStage * 3.8); 
        let spawnDelay = Math.max(28, baseDelay - (gameSpeed * 1.5));
        if (player.boostTimer > 0) spawnDelay /= 5;

        // 600m 단계 설계에 매칭되도록 550m 전방 시점까지만 스폰 허용 허가
        if (flashTimer % 45 === 0 && currentDisplayDistance < (stageTargetDistance - 50) && bgElements.length < 8) {
            const list = charSettings[selectedChar].decors; const emoji = list[Math.floor(Math.random() * list.length)];
            bgElements.push({ x: 850, y: 35 + Math.random() * 140, text: emoji, size: 24 + Math.floor(Math.random() * 16), scrollFactor: 0.35 + Math.random() * 0.3 });
        }

        if (spawnTimer > spawnDelay && currentDisplayDistance < (stageTargetDistance - 50)) {
            let rand = Math.random();
            if (player.boostTimer > 0) {
                let fvRand = Math.random(); let itemY = 100 + Math.random() * 160;
                if (fvRand < 0.25) obstacles.push({ x: 850, y: 330, width: 40, height: 45 });
                else if (fvRand < 0.45) items.push({ x: 850, y: itemY, width: 35, height: 35, type: 'gift' });
                else items.push({ x: 850, y: itemY, width: 30, height: 30, type: 'star' });
            } else {
                if (rand < 0.22) { obstacles.push({ x: 850, y: 330, width: 40, height: 45 }); } 
                else if (rand < 0.45) {
                    let stepHeight = 40 + Math.floor(Math.random() * 3) * 25; steps.push({ x: 850, y: 375 - stepHeight, width: 65, height: stepHeight });
                } else if (rand < 0.72) {
                    let platY = 190 + Math.floor(Math.random() * 2) * 55; let platWidth = 130 + Math.random() * 60; platforms.push({ x: 850, y: platY, width: platWidth, height: 15 });
                    if (Math.random() > 0.35) {
                        let itemRand = Math.random();
                        if (itemRand < 0.1) items.push({ x: 880, y: platY - 45, width: 45, height: 45, type: 'bigStar' });
                        else if (itemRand < 0.25) items.push({ x: 880, y: platY - 40, width: 35, height: 35, type: 'gift' });
                        else items.push({ x: 880, y: platY - 40, width: 30, height: 30, type: 'star' });
                    }
                } else {
                    let itemRand = Math.random(); let itemY = 140 + Math.random() * 110;
                    if (itemRand < 0.08) items.push({ x: 850, y: itemY - 10, width: 45, height: 45, type: 'bigStar' });
                    else if (itemRand < 0.22) items.push({ x: 850, y: itemY, width: 35, height: 35, type: 'gift' });
                    else items.push({ x: 850, y: itemY, width: 30, height: 30, type: 'star' });
                }
            }
            spawnTimer = 0;
        }

        bgElements.forEach(el => el.x -= gameSpeed * el.scrollFactor);
        bgElements = bgElements.filter(el => el.x > -50);

        // [변경] 골인선 진입 연출용 프레임 체크라인 수정
        if (currentDisplayDistance >= (stageTargetDistance - 40) && gameState === 'playing') { goalFlagX -= gameSpeed; }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i]; obs.x -= gameSpeed;
            if (player.x < obs.x + obs.width && player.x + player.width > obs.x && player.y < obs.y + obs.height && player.y + player.height > obs.y) {
                if (player.boostTimer > 0) { obstacles.splice(i, 1); continue; }
                score = Math.max(0, score - 150); playSound('hit'); 
                if (!isMessageForced) showSpeechMessage("아야!"); 
                obstacles.splice(i, 1); continue;
            }
            if (obs.x < -50) obstacles.splice(i, 1);
        }

        for (let i = items.length - 1; i >= 0; i--) {
            let item = items[i]; item.x -= gameSpeed;
            if (player.x < item.x + item.width && player.x + player.width > item.x && player.y < item.y + item.height && player.y + player.height > item.y) {
                if (item.type === 'bigStar') { player.boostTimer = 600; playSound('powerup'); } 
                else if (item.type === 'gift') { score += 5000; playSound('item'); if (!isMessageForced) showSpeechMessage("대박! +5000"); } 
                else { score += 1000; playSound('item'); if (!isMessageForced) showSpeechMessage("+1000!"); }
                items.splice(i, 1); continue;
            }
            if (item.x < -50) items.splice(i, 1);
        }
    }

    function submitRanking() {
        let nameInput = document.getElementById('playerName').value.trim();
        if (!nameInput) nameInput = "익명가족";
        let timeString = `Lv.${currentStage}`; 
        leaderboard.push({ name: nameInput, score: score, date: timeString });
        leaderboard.sort((a, b) => b.score - a.score);
        leaderboard = leaderboard.slice(0, 5);
        saveLeaderboard();
        document.getElementById('nameInputOverlay').style.display = 'none';
        gameState = 'ending';
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cfg = charSettings[selectedChar];

        if (gameState === 'ready') {
            ctx.fillStyle = '#3a5f7d'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffca28'; ctx.font = 'bold 36px Arial'; ctx.textAlign = 'center';
            ctx.fillText("아빠를 이겨라 이것들아", canvas.width / 2, 70);
            ctx.fillStyle = '#ffffff'; ctx.font = '18px Arial';
            ctx.fillText("함께 달릴 캐릭터의 얼굴을 마우스나 손가락으로 누르세요!", canvas.width / 2, 120);

            Object.keys(charSettings).forEach(key => {
                const c = charSettings[key]; const x = c.xBound[0];
                ctx.fillStyle = '#ffffff'; ctx.fillRect(x, 160, 100, 110);
                try {
                    if (images[key].complete && images[key].naturalWidth !== 0) { ctx.drawImage(images[key], x + 20, 170, 60, 60); } 
                    else { ctx.font = '40px Arial'; ctx.fillText(key==='dad'?'👨':key==='mom'?'👩':key==='hayun'?'👧':'👶', x + 50, 215); }
                } catch(e) {}
                ctx.fillStyle = '#333333'; ctx.font = 'bold 15px Arial'; ctx.fillText(c.name, x + 50, 255);
            });
            ctx.fillStyle = '#e2e8f0'; ctx.font = '12px Arial';
            ctx.fillText("🧱 규칙: 600m 단위 누적 마라톤 레이스! 각 단계별 아빠의 고유 도발/칭찬 한마디 멘트 활성화!", canvas.width / 2, 340);
            ctx.fillText("🕹️ PC: A, D(이동), 스페이스바(2단점프) | 📱 모바일: 가로 전체화면 / 양손 분할 터치 제어", canvas.width / 2, 370);

        } else if (gameState === 'playing' || gameState === 'inputName' || gameState === 'gameover' || gameState === 'goalSuccess') {
            ctx.fillStyle = cfg.theme; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.25)'; 
            bgElements.forEach(el => { ctx.font = `${el.size}px Arial`; ctx.textAlign = 'center'; ctx.fillText(el.text, el.x, el.y); });

            ctx.fillStyle = 'rgba(255,255,255,0.02)';
            for(let i=0; i<canvas.width; i+=40) { ctx.fillRect(i, 0, 20, canvas.height); }

            ctx.fillStyle = '#1a202c'; ctx.fillRect(0, 375, canvas.width, 75);
            ctx.fillStyle = '#e2e8f0'; ctx.fillRect(0, 375, canvas.width, 6);

            if (gameState === 'playing' && distance < 150) {
                ctx.save();
                ctx.font = 'bold 13px Arial'; ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.textAlign = 'center';
                ctx.fillText("◀  [왼손] 좌우 무빙 이동 영역  ▶", canvas.width * 0.25, 415);
                ctx.fillText("▲  [오른손] 점프 구역  ▲", canvas.width * 0.75, 415);
                ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 2; ctx.setLineDash([4, 4]);
                ctx.beginPath(); ctx.moveTo(canvas.width/2, 375); ctx.lineTo(canvas.width/2, 450); ctx.stroke(); ctx.restore();
            }

            let currentDisplayDistance = Math.floor(distance);
            if (currentDisplayDistance >= (stageTargetDistance - 40)) {
                ctx.save(); ctx.lineWidth = 6; ctx.strokeStyle = '#ffffff';
                ctx.beginPath(); ctx.moveTo(goalFlagX, 150); ctx.lineTo(goalFlagX, 375); ctx.stroke(); ctx.fillStyle = '#ffffff'; ctx.fillRect(goalFlagX, 150, 60, 40);
                ctx.fillStyle = '#000000'; ctx.fillRect(goalFlagX, 150, 15, 13); ctx.fillRect(goalFlagX + 30, 150, 15, 13); ctx.fillRect(goalFlagX + 15, 163, 15, 14); ctx.fillRect(goalFlagX + 45, 163, 15, 14); ctx.fillRect(goalFlagX, 177, 15, 13); ctx.fillRect(goalFlagX + 30, 177, 15, 13);
                ctx.font = 'bold 12px Arial'; ctx.fillStyle = '#ffffff'; ctx.textAlign = 'left'; ctx.fillText(`NEXT Lv.${currentStage+1}`, goalFlagX + 5, 140); ctx.restore();
            }

            platforms.forEach(plat => { ctx.fillStyle = '#a0aec0'; ctx.fillRect(plat.x, plat.y, plat.width, plat.height); ctx.fillStyle = '#4a5568'; ctx.fillRect(plat.x, plat.y, plat.width, 3); });
            steps.forEach(step => {
                ctx.fillStyle = '#718096'; ctx.fillRect(step.x, step.y, step.width, step.height); ctx.strokeStyle = '#2d3748'; ctx.lineWidth = 3; ctx.strokeRect(step.x, step.y, step.width, step.height);
                ctx.fillStyle = '#4a5568'; ctx.fillRect(step.x, step.y, step.width, 5);
            });

            ctx.font = '32px Arial'; ctx.textAlign = 'center';
            obstacles.forEach(obs => { ctx.fillText(cfg.obstacle, obs.x + obs.width/2, obs.y + obs.height - 5); });
            items.forEach(item => {
                if (item.type === 'bigStar') { let hue = (flashTimer * 15) % 360; ctx.fillStyle = `hsl(${hue}, 100%, 65%)`; ctx.font = 'bold 45px Arial'; ctx.fillText('🌟', item.x + item.width/2, item.y + item.height - 2); } 
                else if (item.type === 'gift') { ctx.font = '35px Arial'; ctx.fillText('🎁', item.x + item.width/2, item.y + item.height - 2); } 
                else { ctx.font = '28px Arial'; ctx.fillText('⭐', item.x + item.width/2, item.y + item.height - 2); }
            });

            if (gameState === 'gameover') { ctx.fillStyle = (flashTimer % 4 < 2) ? '#e53e3e' : 'rgba(229,62,62,0.3)'; } 
            else if (player.boostTimer > 0) { let pChroma = (flashTimer * 25) % 360; ctx.fillStyle = `hsl(${pChroma}, 100%, 55%)`; } 
            else { ctx.fillStyle = cfg.bodyColor; }
            ctx.fillRect(player.x, player.y + 35, player.width, 40);
            ctx.fillStyle = '#ffffff'; ctx.fillRect(player.x + 8, player.y + 70, 12, 5); ctx.fillRect(player.x + 30, player.y + 70, 12, 5);

            try {
                if (images[selectedChar].complete && images[selectedChar].naturalWidth !== 0) { ctx.drawImage(images[selectedChar], player.x - 5, player.y - 5, 60, 60); } 
                else { ctx.font = '45px Arial'; ctx.fillText(selectedChar==='dad'?'👨':selectedChar==='mom'?'👩':selectedChar==='hayun'?'👧':'👶', player.x + 25, player.y + 32); }
            } catch(e) {}

            if ((messageTimer > 0 || player.boostTimer > 0) && (gameState === 'playing' || gameState === 'goalSuccess')) {
                ctx.save(); ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center'; let textWidth = ctx.measureText(messageText).width;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)'; ctx.strokeStyle = isMessageForced ? '#ff1744' : '#ffca28'; ctx.lineWidth = 2; let boxX = player.x + player.width/2 - (textWidth + 16)/2; let boxY = player.y - 45;
                ctx.fillRect(boxX, boxY, textWidth + 16, 26); ctx.strokeRect(boxX, boxY, textWidth + 16, 26);
                ctx.fillStyle = isMessageForced ? '#ff1744' : (player.boostTimer > 0 ? '#e53e3e' : '#2d3748'); 
                ctx.fillText(messageText, player.x + player.width/2, player.y - 28); ctx.restore();
            }

            // [변경] 완주 대사 텍스트를 커스텀 한마디 지정 대사로 동적 맵핑 드로잉
            if (gameState === 'goalSuccess') {
                particles.forEach(p => { ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation * Math.PI / 180); ctx.fillStyle = p.color; ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size); ctx.restore(); });
                ctx.fillStyle = (flashTimer % 20 < 10) ? '#ffca28' : '#ffffff'; 
                
                // 글씨 길이에 맞춰서 폰트 크기 자동 조율 바인딩
                let currentMsgText = stageClearMessages[currentStage] || "완주 성공!!";
                ctx.font = currentMsgText.length > 15 ? 'bold 30px Arial' : 'bold 38px Arial'; 
                ctx.textAlign = 'center';
                ctx.fillText(currentMsgText, canvas.width / 2, canvas.height / 2);
            }

            if (gameState === 'gameover') {
                ctx.fillStyle = '#ff1744'; ctx.font = 'bold 55px Arial'; ctx.textAlign = 'center'; ctx.fillText("💥 탈락! GAME OVER", canvas.width / 2, canvas.height / 2 - 30);
            }

            // 상단 대시보드 (총 누적 600m 단위 계산 매핑식 적용)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)'; ctx.fillRect(10, 10, 780, 45);
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'left';
            ctx.fillStyle = '#ffca28'; ctx.fillText(`STAGE ${currentStage}`, 25, 38); 
            ctx.fillStyle = '#fff'; ctx.fillText(`점수: ${score}`, 135, 38);
            ctx.fillText(`속도: ${gameSpeed.toFixed(1)} km/h`, 255, 38); 
            
            // 600m 누적 시스템 거리 표기법 개조
            let accumBaseDist = (currentStage - 1) * stageTargetDistance;
            ctx.fillText(`거리: ${accumBaseDist + currentDisplayDistance}m / ${currentStage * stageTargetDistance}m`, 385, 38);
            
            if (player.boostTimer > 0) { ctx.fillStyle = '#ffeb3b'; ctx.font = 'bold 13px Arial'; ctx.fillText(`🔥 무적 피버!`, 590, 38); }
            
            ctx.fillStyle = '#444444'; ctx.fillRect(685, 24, 95, 16);
            ctx.fillStyle = '#ffca28'; ctx.fillRect(685, 24, (currentDisplayDistance / stageTargetDistance) * 95, 16);

        } else if (gameState === 'ending') {
            ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffca28'; ctx.font = 'bold 32px Arial'; ctx.textAlign = 'center';
            ctx.fillText("🏆 게임 종료! 최종 스코어보드 랭킹", canvas.width / 2, 60);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.08)'; ctx.fillRect(150, 120, 500, 195);
            ctx.fillStyle = '#ffca28'; ctx.font = 'bold 15px Arial'; ctx.textAlign = 'center';
            ctx.fillText("가족 실시간 통합 TOP 5 랭킹", canvas.width / 2, 145);
            
            leaderboard.forEach((rank, index) => {
                ctx.fillStyle = '#ffffff'; ctx.font = '14px Arial'; ctx.textAlign = 'left';
                ctx.fillText(`${index + 1}위.   ${rank.name}`, 180, 185 + (index * 26));
                ctx.fillStyle = '#ffca28'; ctx.font = 'bold 12px Arial'; ctx.fillText(rank.date, 340, 185 + (index * 26));
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'right';
                ctx.fillText(`${rank.score} 점`, 620, 185 + (index * 26));
            });

            ctx.fillStyle = '#ff5722'; ctx.fillRect(300, 340, 200, 55);
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 18px Arial'; ctx.textAlign = 'center';
            ctx.fillText("다시 도전하기", canvas.width / 2, 374);
        }
    }

    loadLeaderboard();
    mainLoop();
</script>

</body>
</html>
