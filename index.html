<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kim's Family Go!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; text-align: center;
            box-sizing: border-box;
        }
        #startScreen { background: #3a5f7d; }
        #endingScreen { background: #1a1a2e; display: none; }
        
        h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 3px 3px #000; color: #ffca28; }
        p { margin: 5px 0; font-size: 1rem; text-shadow: 1px 1px #000; }
        
        .char-container { display: flex; gap: 15px; margin: 20px 0; }
        .char-card {
            background: #fff; color: #333; padding: 10px; border-radius: 8px;
            cursor: pointer; border: 4px solid #fff; width: 80px; transition: transform 0.2s;
        }
        .char-card:hover { transform: scale(1.05); border-color: #ffca28; }
        .char-thumb { width: 60px; height: 60px; background: #ddd; border-radius: 5px; margin-bottom: 5px; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .char-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .char-name { font-weight: bold; font-size: 0.9rem; }
        
        .btn {
            background: #ff5722; color: white; border: none; padding: 12px 30px;
            font-size: 1.2rem; font-weight: bold; border-radius: 5px; cursor: pointer;
            box-shadow: 0 4px #bf360c; text-shadow: 1px 1px #000; margin-top: 15px;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        
        .ranking-box {
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px;
            width: 60%; margin: 15px 0; text-align: left; box-sizing: border-box;
        }
        .ranking-item { display: flex; justify-content: space-between; margin: 5px 0; font-size: 1.1rem; }
        .rank-highlight { color: #ffca28; font-weight: bold; }
        
        .how-to { font-size: 0.85rem; color: #ddd; margin-top: 10px; }
        
        /* [추가] 모바일 터치 패드 조작 UI */
        #mobileControls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            display: none;
            justify-content: space-between;
            pointer-events: none;
        }
        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: white;
            font-weight: bold;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
        }
        .control-btn:active {
            background: rgba(255,255,255,0.6);
        }
        .dir-pad {
            display: flex;
            gap: 10px;
        }
        
        @media (max-width: 800px) {
            #mobileControls {
                display: flex;
            }
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <div id="startScreen" class="screen">
        <h1>KIM'S FAMILY GO!</h1>
        <p>함께 달릴 캐릭터를 선택하세요!</p>
        
        <div class="char-container">
            <div class="char-card" onclick="selectCharacter('dad')">
                <div class="char-thumb"><img src="dad.png" onerror="this.style.display='none'; this.parentNode.innerText='👨'"></div>
                <div class="char-name">아빠</div>
            </div>
            <div class="char-card" onclick="selectCharacter('mom')">
                <div class="char-thumb"><img src="mom.png" onerror="this.style.display='none'; this.parentNode.innerText='👩'"></div>
                <div class="char-name">엄마</div>
            </div>
            <div class="char-card" onclick="selectCharacter('hayun')">
                <div class="char-thumb"><img src="hayun.png" onerror="this.style.display='none'; this.parentNode.innerText='👧'"></div>
                <div class="char-name">하윤</div>
            </div>
            <div class="char-card" onclick="selectCharacter('yeeun')">
                <div class="char-thumb"><img src="yeeun.png" onerror="this.style.display='none'; this.parentNode.innerText='👶'"></div>
                <div class="char-name">예은</div>
            </div>
        </div>
        
        <div class="how-to">🕹️ 조작 방법: [PC] ◀/▶ 또는 A/D: 좌우이동 | 스페이스바: 점프<br>[모바일] 화면 하단 버튼 터치 조작</div>
    </div>

    <div id="mobileControls">
        <div class="dir-pad">
            <div class="control-btn" id="btnLeft">◀</div>
            <div class="control-btn" id="btnRight">▶</div>
        </div>
        <div class="control-btn" id="btnJump">J</div>
    </div>

    <div id="endingScreen" class="screen">
        <h1>🎉 GOAL! 1km 완주 성공!</h1>
        <p>최종 점수: <span id="finalScore" style="color:#ffca28; font-weight:bold; font-size:1.5rem;">0</span>점</p>
        
        <div class="ranking-box" id="rankingList">
            </div>
        
        <button class="btn" onclick="restartGame()">다시 도전하기</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // 사운드 시스템 (Web Audio API)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (type === 'jump') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'item') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'hit') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    const charSettings = {
        dad: { name: '아빠', theme: '#4a5568', obstacle: '⚙️ 톱니바퀴', bgName: '공장 지대', imgUrl: 'dad.png', bodyColor: '#3182ce' },
        mom: { name: '엄마', theme: '#48bb78', obstacle: '🛒 카트', bgName: '슈퍼마켓', imgUrl: 'mom.png', bodyColor: '#f6ad55' },
        hayun: { name: '하윤', theme: '#ed64a6', obstacle: '🪑 책상', bgName: '학교 가는 길', imgUrl: 'hayun.png', bodyColor: '#b7791f' },
        yeeun: { name: '예은', theme: '#ecc94b', obstacle: '🎒 가방', bgName: '학교 교실', imgUrl: 'yeeun.png', bodyColor: '#9b2c2c' }
    };

    const images = {};
    Object.keys(charSettings).forEach(key => {
        images[key] = new Image();
        images[key].src = charSettings[key].imgUrl;
    });

    let gameState = 'ready'; 
    let selectedChar = 'dad';
    let score = 0;
    let distance = 0; 
    let gameSpeed = 6;
    
    // 플레이어 스탯 (X축 속도 스피드 추가)
    let player = { 
        x: 80, 
        y: 300, 
        width: 50, 
        height: 75, 
        vy: 0, 
        gravity: 1.2, 
        isGrounded: false,
        speedX: 6 // 좌우 이동 반응성 속도 값
    };
    
    // 키 입력 감지 트리거 플래그
    let keys = { left: false, right: false };

    let obstacles = [];
    let items = [];
    let spawnTimer = 0;
    let animationFrameId;

    function selectCharacter(charKey) {
        selectedChar = charKey;
        document.getElementById('startScreen').style.display = 'none';
        initGame();
    }

    function initGame() {
        gameState = 'playing';
        score = 0;
        distance = 0;
        gameSpeed = 6;
        player.x = 80;
        player.y = 300;
        player.vy = 0;
        obstacles = [];
        items = [];
        spawnTimer = 0;
        keys.left = false;
        keys.right = false;
        
        if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        loop();
    }

    function jump() {
        if (player.isGrounded && gameState === 'playing') {
            player.vy = -18;
            player.isGrounded = false;
            playSound('jump');
        }
    }

    // PC 키보드 입력 핸들러 추가
    window.addEventListener('keydown', (e) => {
        if (gameState !== 'playing') return;
        if (e.code === 'Space') { e.preventDefault(); jump(); }
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') { keys.left = true; }
        if (e.code === 'ArrowRight' || e.code === 'KeyD') { keys.right = true
